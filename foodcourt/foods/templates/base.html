<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>
        {% block title %}
        Default
        {% endblock %}
    </title>
</head>
<body>
    <nav class="navbar navbar-dark bg-danger shadow-lg">
        <div class="container-fluid">
            <a href="{% url 'home' %}" class="navbar-brand">Pizza Order</a>
            <div class="d-flex">
                {% if request.user.is_authenticated %}
                <a href="{% url 'orders' %}" class="btn btn-primary me-2">Dashboard</a>

                {% else %}
                <a href="{% url 'login' %}" class="navbar-brand">Login</a>
                <a href="{% url 'register' %}" class="navbar-brand">Register</a>
                {% endif %}
                <a class="btn btn-light" href="{% url 'cart' %}">
                    <i class="fa-solid fa-cart-shopping">{{request.user.get_cart_count}}</i>
                </a>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
