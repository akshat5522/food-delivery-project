{% extends "base.html" %}

{% block content %}
<div class="container card shadow-lg mt-5">
    <table class="table">
        <thread>
            <tr>
                <th scope="col">S.no</th>
                <th scope="col">Total</th>
                <th scope="col">Date</th>
            </tr>
        </thread>
        <tbody>
            {% for order in orders %}
            <tr>
                <th scope="row">{{forloop.counter}}</th>
                
                <td>{{order.get_cart_total}}</td>
                <td>
                    {{order.created_at}}
                </td>
                <td>{{cartitems.pizza.price}}</td>

            </tr>
            {% endfor %}
            
        </tbody>
    </table>


</div>

{% endblock %}
